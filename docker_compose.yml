# docker-compose.yml
version: '3.8'

services:
  raster-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./temp_uploads:/app/temp_uploads
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  raster-frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - raster-api
    restart: unless-stopped
